<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Warnoze Manga</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    background:#111;
    color:white;
    font-family:Arial,sans-serif;
}

header{
    background:#d40000;
    padding:20px;
    text-align:center;
}

header h1{
    font-size:32px;
}

.search{
    text-align:center;
    margin:20px;
}

.search input{
    width:90%;
    max-width:500px;
    padding:12px;
    border:none;
    border-radius:8px;
    font-size:16px;
}

.container{
    display:flex;
    justify-content:center;
    flex-wrap:wrap;
    padding:20px;
}

.card{
    width:300px;
    background:#222;
    border-radius:10px;
    overflow:hidden;
    margin:20px;
    box-shadow:0 0 10px rgba(0,0,0,.5);
}

.card img{
    width:100%;
    display:block;
}

.info{
    padding:15px;
}

.info h2{
    margin-bottom:10px;
}

.info p{
    color:#ccc;
    margin-bottom:15px;
}

button{
    width:100%;
    padding:12px;
    background:#d40000;
    color:white;
    border:none;
    cursor:pointer;
    font-size:18px;
}

button:hover{
    background:red;
}

footer{
    text-align:center;
    padding:20px;
    color:#999;
}
</style>

</head>

<body>

<header>
<h1>🔥 Warnoze Manga 🔥</h1>
</header>

<div class="search">
<input type="text" placeholder="Search Manga...">
</div>

<div class="container">

<div class="card">

<img src="cover.jpg" alt="Gardni Worse">

<div class="info">

<h2>Gardni Worse</h2>

<p>
An action fantasy manga created by Warnoze.
</p>

<button onclick="location.href='chapter1.html'">
📖 Read Chapter 1
</button>

</div>

</div>

</div>

<footer>

© 2026 Warnoze Manga

</footer>

</body>
</html>
